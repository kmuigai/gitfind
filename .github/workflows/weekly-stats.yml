name: GitFind Weekly Stats

on:
  # Run every Sunday at 08:00 UTC
  schedule:
    - cron: '0 8 * * 0'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  weekly-stats:
    name: Fetch Contributors, Commits & Releases
    runs-on: ubuntu-latest
    timeout-minutes: 540 # 9 hours — 8K repos × 5 calls at 5K/hour

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx (TypeScript runner)
        run: npm install -g tsx

      - name: Run weekly stats collection
        run: npx tsx scripts/snapshot-weekly.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITFIND_GITHUB_TOKEN }}
